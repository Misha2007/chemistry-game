<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anorgaaniliste ainete õppemängud: definitsioonid, klassifikatsioon ja kokkuviimine." />
    <title>Anorgaaniliste ainete mängud</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        overflow: hidden;
        position: relative;
      }

      /* Animated background particles */
      .bg-particles {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .particle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.06);
        animation: float linear infinite;
      }

      @keyframes float {
        0% {
          transform: translateY(100vh) rotate(0deg);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 1;
        }
        100% {
          transform: translateY(-100px) rotate(720deg);
          opacity: 0;
        }
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        padding: 50px 40px;
        border-radius: 24px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        width: min(92%, 680px);
        position: relative;
        z-index: 1;
        animation: slideUp 0.6s ease-out;
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .logo-icon {
        font-size: 48px;
        margin-bottom: 16px;
        animation: pulse 2s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }

      h1 {
        margin-bottom: 12px;
        font-weight: 700;
        font-size: 28px;
        letter-spacing: -0.5px;
        background: linear-gradient(135deg, #fff, #a8c0ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }

      .subtitle {
        color: rgba(255, 255, 255, 0.6);
        font-size: 15px;
        margin-bottom: 32px;
        font-weight: 400;
      }

      .menu-btn {
        display: flex;
        align-items: center;
        gap: 16px;
        width: 100%;
        padding: 18px 22px;
        margin: 12px 0;
        font-size: 16px;
        font-weight: 600;
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 16px;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: rgba(255, 255, 255, 0.07);
        color: white;
        text-decoration: none;
        position: relative;
        overflow: hidden;
      }

      .menu-btn::before {
        content: "";
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
        transition: left 0.5s;
      }

      .menu-btn:hover::before {
        left: 100%;
      }

      .menu-btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        border-color: rgba(255, 255, 255, 0.3);
        background: rgba(255, 255, 255, 0.12);
      }

      .menu-btn:active {
        transform: translateY(-1px);
      }

      .menu-btn .btn-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        flex-shrink: 0;
      }

      .menu-btn:nth-child(1) .btn-icon {
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      .menu-btn:nth-child(2) .btn-icon {
        background: linear-gradient(135deg, #f093fb, #f5576c);
      }

      .menu-btn:nth-child(3) .btn-icon {
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .btn-text {
        text-align: left;
      }

      .btn-text .btn-title {
        display: block;
        font-size: 16px;
        font-weight: 600;
      }

      .btn-text .btn-desc {
        display: block;
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        font-weight: 400;
        margin-top: 2px;
      }

      .menu-btn .btn-arrow {
        margin-left: auto;
        font-size: 14px;
        color: rgba(255, 255, 255, 0.3);
        transition: transform 0.3s;
      }

      .menu-btn:hover .btn-arrow {
        transform: translateX(4px);
      }

      .qr-wrap {
        margin-top: 28px;
        padding-top: 22px;
        border-top: 1px solid rgba(255, 255, 255, 0.1);
      }

      .qr-wrap span {
        font-size: 13px;
        color: rgba(255, 255, 255, 0.5);
        display: block;
        margin-bottom: 12px;
      }

      #siteQr {
        width: 120px;
        height: 120px;
        border-radius: 12px;
        background: white;
        padding: 8px;
        opacity: 0.9;
        transition: opacity 0.3s;
      }

      #siteQr:hover {
        opacity: 1;
      }

      #siteUrl {
        display: block;
        margin-top: 10px;
        color: rgba(255, 255, 255, 0.5);
        word-break: break-all;
        font-size: 12px;
        text-decoration: none;
        transition: color 0.3s;
      }

      #siteUrl:hover {
        color: #a8c0ff;
      }

      @media (max-width: 480px) {
        .container {
          padding: 36px 24px;
        }

        h1 {
          font-size: 24px;
        }

        .menu-btn {
          padding: 14px 16px;
        }

        .menu-btn .btn-icon {
          width: 42px;
          height: 42px;
          font-size: 18px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Animated background particles -->
    <div class="bg-particles" id="particles"></div>

    <main class="container">
      <div class="logo-icon">🧪</div>
      <h1>Anorgaaniliste ainete mängud</h1>
      <p class="subtitle">Õpi keemiat interaktiivsete mängude kaudu</p>

      <nav aria-label="Mängude menüü">
        <a class="menu-btn" href="1_definitsioonid.html">
          <div class="btn-icon"><i class="fas fa-puzzle-piece"></i></div>
          <div class="btn-text">
            <span class="btn-title">Definitsioonide kokkupanek</span>
            <span class="btn-desc">Lohista õiged sõnad tühikutele</span>
          </div>
          <i class="fas fa-chevron-right btn-arrow"></i>
        </a>

        <a class="menu-btn" href="2_klassifikatsioon.html">
          <div class="btn-icon"><i class="fas fa-basket-shopping"></i></div>
          <div class="btn-text">
            <span class="btn-title">Klassifikatsiooni mäng</span>
            <span class="btn-desc">Püüda korviga õigeid aineid</span>
          </div>
          <i class="fas fa-chevron-right btn-arrow"></i>
        </a>

        <a class="menu-btn" href="3_kokkuviimine.html">
          <div class="btn-icon"><i class="fas fa-link"></i></div>
          <div class="btn-text">
            <span class="btn-title">Aine ja nimetuse kokkuviimine</span>
            <span class="btn-desc">Paarista valem nimetusega</span>
          </div>
          <i class="fas fa-chevron-right btn-arrow"></i>
        </a>
      </nav>

      <section class="qr-wrap" aria-label="Lehe URL ja QR">
        <span>Ava see leht telefonis:</span>
        <img id="siteQr" alt="Veebilehe QR-kood" />
        <a id="siteUrl" href="#" target="_blank" rel="noopener"></a>
      </section>
    </main>

    <script>
      const pageUrl = window.location.href;
      const qrImg = document.getElementById("siteQr");
      const siteUrl = document.getElementById("siteUrl");
      const encoded = encodeURIComponent(pageUrl);

      qrImg.src =
        "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
        encoded;
      siteUrl.href = pageUrl;
      siteUrl.innerText = pageUrl;

      // Create floating particles
      const particlesContainer = document.getElementById("particles");
      const particleCount = 20;

      for (let i = 0; i < particleCount; i++) {
        const particle = document.createElement("div");
        particle.classList.add("particle");
        const size = Math.random() * 8 + 3;
        particle.style.width = size + "px";
        particle.style.height = size + "px";
        particle.style.left = Math.random() * 100 + "%";
        particle.style.animationDuration = Math.random() * 15 + 10 + "s";
        particle.style.animationDelay = Math.random() * 10 + "s";
        particlesContainer.appendChild(particle);
      }
    </script>
  </body>
</html>
