<!doctype html>
<html lang="et">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Anorgaaniliste ainete opimangud: definitsioonid, klassifikatsioon ja kokkuviimine." />
    <title>Anorgaaniliste ainete mangud</title>

    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #141e30, #243b55);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
      }

      .container {
        text-align: center;
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(10px);
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        width: min(90%, 640px);
      }

      h1 {
        margin-bottom: 30px;
        font-weight: 300;
      }

      .menu-btn {
        display: block;
        width: 100%;
        padding: 18px;
        margin: 12px 0;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: 0.3s;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
        color: white;
        text-decoration: none;
        box-sizing: border-box;
      }

      .menu-btn:hover {
        transform: scale(1.03);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      }

      .qr-wrap {
        margin-top: 22px;
        padding-top: 18px;
        border-top: 1px solid rgba(255, 255, 255, 0.25);
      }

      #siteQr {
        width: 150px;
        height: 150px;
        border-radius: 10px;
        background: white;
        padding: 8px;
      }

      #siteUrl {
        display: block;
        margin-top: 10px;
        color: #d6eeff;
        word-break: break-all;
      }
    </style>
  </head>

  <body>
    <main class="container">
      <h1>Anorgaaniliste ainete virtuaalsed mangud</h1>

      <nav aria-label="Mangude menuu">
        <a class="menu-btn" href="1_definitsioonid.html">Definitsiooni moiste kokkupanek</a>
        <a class="menu-btn" href="2_klassifikatsioon.html">Klassifikatsiooni mang</a>
        <a class="menu-btn" href="3_kokkuviimine.html">Aine ja nimetuse kokkuviimine</a>
      </nav>

      <section class="qr-wrap" aria-label="Lehe URL ja QR">
        <div>Ava see leht telefonis (QR):</div>
        <img id="siteQr" alt="Veebilehe QR-kood" />
        <a id="siteUrl" href="#" target="_blank" rel="noopener"></a>
      </section>
    </main>

    <script>
      const pageUrl = window.location.href;
      const qrImg = document.getElementById("siteQr");
      const siteUrl = document.getElementById("siteUrl");
      const encoded = encodeURIComponent(pageUrl);

      qrImg.src =
        "https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=" +
        encoded;
      siteUrl.href = pageUrl;
      siteUrl.innerText = pageUrl;
    </script>
  </body>
</html>
